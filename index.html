<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>房叔 AI 提示詞生成器</title>
  <style>
    :root{--gold:#c9a227;--black:#080808;--line:#e8e2d5;--paper:#fffaf0}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif;background:#f6f2e9;color:#151515}
    header{background:var(--black);color:white;border-bottom:4px solid var(--gold);padding:18px}
    .brand{max-width:860px;margin:auto;display:flex;align-items:center;gap:14px}
    .brand img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
    h1{font-size:20px;margin:0;font-weight:900}
    .sub{font-size:12px;color:#d6c48a;margin-top:3px}
    main{max-width:860px;margin:20px auto;padding:0 14px 40px}
    .box{background:white;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(0,0,0,.05)}
    label{display:block;font-size:13px;font-weight:800;margin:0 0 8px}
    input,textarea,select{width:100%;border:1.5px solid #ddd;border-radius:10px;padding:12px;font-size:15px;background:white}
    textarea{min-height:100px;resize:vertical;line-height:1.7}
    input:focus,textarea:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .hint{font-size:12px;color:#666;line-height:1.7;margin-top:8px}
    .model{display:inline-flex;gap:8px;align-items:center;background:#151515;color:#f5d060;border:1px solid #4e3f14;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer}
    .primary{background:linear-gradient(135deg,#c9a227,#f5d060,#c9a227);color:#111;flex:1;min-width:180px}
    .secondary{background:#151515;color:white}
    .ghost{background:#f3f3f3;color:#333}
    button:disabled{opacity:.55;cursor:not-allowed}
    pre{white-space:pre-wrap;word-break:break-word;background:#111;color:#f8f4e8;border-radius:12px;padding:16px;line-height:1.8;min-height:220px;overflow:auto}
    .error{background:#fff1f1;color:#b91c1c;border:1px solid #fecaca;border-radius:10px;padding:10px;font-size:13px;margin-top:10px}
    .ok{background:var(--paper);border-left:4px solid var(--gold);padding:12px;border-radius:10px;font-size:13px;line-height:1.7}
    @media(max-width:640px){.grid{grid-template-columns:1fr}.brand img{width:48px;height:48px}h1{font-size:18px}}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo-uncle-house.jpg" alt="Uncle House Logo" />
      <div>
        <h1>房叔 AI 提示詞生成器</h1>
        <div class="sub">最簡單版：輸入 API Key → 輸入主題 → 一鍵生成</div>
      </div>
    </div>
  </header>

  <main>
    <section class="box">
      <div class="model">固定模型：gpt-5.6-terra</div>
      <p class="hint">API Key 只存在目前瀏覽器分頁，不會寫入 GitHub。關閉或重新整理後需重新貼入。不要把 Key 貼到公開留言或公開檔案。</p>
    </section>

    <section class="box">
      <label for="apiKey">OpenAI API Key</label>
      <input id="apiKey" type="password" placeholder="sk-proj-..." autocomplete="off" />
      <div class="actions" style="margin-top:10px">
        <button class="ghost" id="toggleKey" type="button">顯示 / 隱藏 Key</button>
        <button class="ghost" id="clearKey" type="button">清除 Key</button>
      </div>
    </section>

    <section class="box">
      <label for="topic">主題</label>
      <textarea id="topic" placeholder="例：每天發物件照沒人看、AI 工具幫房仲省時間、馬來西亞置產怎麼跟客戶說"></textarea>
      <div class="grid" style="margin-top:12px">
        <div>
          <label for="pillar">內容方向</label>
          <select id="pillar">
            <option>客戶開發</option>
            <option>短影音拍攝技巧</option>
            <option>選題策略</option>
            <option>個人品牌建立</option>
            <option>自媒體營運</option>
            <option>變現策略</option>
            <option>AI內容工具</option>
            <option>海外置產觀察</option>
          </select>
        </div>
        <div>
          <label for="format">輸出格式</label>
          <select id="format">
            <option>短影音腳本 + FB + Threads + V3圖片提示詞</option>
            <option>只要短影音腳本</option>
            <option>只要FB長文</option>
            <option>只要V3圖片提示詞</option>
            <option>全部完整輸出</option>
          </select>
        </div>
      </div>
      <div id="error"></div>
    </section>

    <section class="box">
      <div class="actions">
        <button class="primary" id="generate" type="button">用 GPT API 生成</button>
        <button class="secondary" id="copy" type="button">複製結果</button>
        <button class="ghost" id="download" type="button">下載 .txt</button>
      </div>
      <div class="ok" style="margin-top:12px">圖片提示詞固定輸出為「V3 圖片生成模型」格式，包含繁中 Prompt、English Prompt、Negative Prompt、Canva 排版與 V3 檢查。</div>
      <pre id="result">生成結果會出現在這裡。</pre>
    </section>
  </main>

  <script>
    const GPT_MODEL = "gpt-5.6-terra";
    const IMAGE_MODEL = "V3 圖片生成模型";
    const $ = id => document.getElementById(id);

    $("toggleKey").onclick = () => {
      $("apiKey").type = $("apiKey").type === "password" ? "text" : "password";
    };
    $("clearKey").onclick = () => {
      $("apiKey").value = "";
    };

    function systemPrompt() {
      return `你是房叔自媒體學院的內容總監，專長是房仲自媒體、AI工具、馬來西亞置產與個人品牌。輸出必須用繁體中文，語氣直接、專業、可執行，避免浮誇成功學。核心句：做自媒體不是在追流量，是在建立一台讓客戶主動找你的系統。`;
    }

    function userPrompt() {
      return `請依照以下條件產出內容：

主題：${$("topic").value.trim()}
內容方向：${$("pillar").value}
輸出格式：${$("format").value}

請包含：
1. 3個爆款標題
2. 60秒短影音腳本，使用 Hook / Problem / Insight / Action / CTA
3. FB貼文版本，開頭25字內要有衝突感
4. Threads 5則推文串
5. CTA與留言關鍵字
6. ${IMAGE_MODEL} 提示詞：
   - 主圖 Prompt（繁中）
   - Main Prompt（English）
   - Negative Prompt
   - Canva 排版指引
   - V3 檢查：Apple / Netflix / Luxury / Documentary / Human，避免 Fake Guru / Overhype / Clickbait / Hard Sell

請讓內容適合台灣房仲、馬來西亞置產客戶、高收入家庭與個人品牌新手。`;
    }

    async function streamGPT(apiKey, onText) {
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: GPT_MODEL,
          max_completion_tokens: 8000,
          stream: true,
          messages: [
            { role: "system", content: systemPrompt() },
            { role: "user", content: userPrompt() }
          ]
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `OpenAI API 錯誤 ${res.status}`);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") continue;
          try {
            const json = JSON.parse(data);
            const text = json.choices?.[0]?.delta?.content;
            if (text) onText(text);
          } catch {}
        }
      }
    }

    $("generate").onclick = async () => {
      const apiKey = $("apiKey").value.trim();
      const topic = $("topic").value.trim();
      $("error").innerHTML = "";
      if (!apiKey) return showError("請先貼上 OpenAI API Key。");
      if (!topic) return showError("請先輸入主題。");
      $("generate").disabled = true;
      $("result").textContent = "";
      try {
        await streamGPT(apiKey, text => $("result").textContent += text);
      } catch (e) {
        showError("生成失敗：" + e.message);
      } finally {
        $("generate").disabled = false;
      }
    };

    $("copy").onclick = async () => {
      await navigator.clipboard.writeText($("result").textContent);
      $("copy").textContent = "已複製";
      setTimeout(() => $("copy").textContent = "複製結果", 1200);
    };

    $("download").onclick = () => {
      const blob = new Blob([$("result").textContent], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "房叔AI提示詞.txt";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    function showError(message) {
      $("error").innerHTML = `<div class="error">${message}</div>`;
    }
  </script>
</body>
</html>
