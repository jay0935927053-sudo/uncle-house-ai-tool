function buildSystemPrompt(form){

語氣禁區：❌「大家好，我是XXX今天要跟大家分享」❌「非常重要」「關鍵秘訣」❌「保證成交」❌「歡迎訂閱按讚」放在開頭
品牌錨定句（每篇至少帶入一次）：「做自媒體不是在追流量，是在建立一台讓客戶主動找你的系統。」
主題：${form.topic}｜內容柱：${form.pillar} — ${PILLARS.find(p=>p.code===form.pillar)?.name}（痛點：${PILLARS.find(p=>p.code===form.pillar)?.pain}）｜受眾：台灣房仲業務員
短影音：IGNITE六幕（I=Interrupt/G=Gap/N=Nightmare/I=Inversion/T=Transfer/E=Echo），每幕標注時間鏡頭。長影片：七幕電影，完整逐字稿含時間戳。FB長文：2000字+，開場25字內衝突句，每300字翻轉，結尾：「💬留言『[關鍵字]』，我讓助理把[資源]私訊給你。」繁體中文輸出。`;
}
function buildUserPrompt(form){

  if(form.scriptType==="long"||form.scriptType==="both")o.push(`【長影片腳本—七幕電影10–15分鐘】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🎬七幕電影腳本 情緒弧線：觸發→破裂→入口→深淵→翻轉→昇華→宣言\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【幕1】觸發事件（0–1分）逐字稿：...\n【幕2】世界破裂（1–3分）逐字稿：... Pattern Interrupt（2分）：...\n【幕3】新世界入口（3–5分）核心洞察：... 逐字稿：...\n【幕4】深淵時刻（5–8分）案例故事：... 逐字稿：...\n【幕5】翻轉武器（8–11分）系統：... 步驟：...\n【幕6】昇華時刻（11–13分）逐字稿：...\n【幕7】世界觀宣言（13–15分）核心主張：... CTA：...\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
  const sp=form.platforms;
  if(sp.length>0){
    let p=`【跨平台文案】\n`;
    if(sp.includes("yt_desc"))p+=`📺 YT說明欄+標籤（150–300字，SEO關鍵字，15–20個hashtag三層）\n`;
    if(sp.includes("ig_reels"))p+=`📸 IG Reels字幕（每行≤12字，關鍵詞加【】）\n`;
    if(sp.includes("fb"))p+=`👥 FB長文（2000字+，開場≤25字衝突句，每300字翻轉，留言CTA）\n`;
    if(sp.includes("threads"))p+=`🧵 Threads推文串（7則，每則100–200字，整串最多2個hashtag）\n`;
    if(sp.includes("line"))p+=`💬 LINE社群文案（100–200字，口語開頭，2–4個表情）\n`;
    if(sp.includes("ig_carousel"))p+=`🖼️ IG輪播圖（5張：封面→問題→解法A→解法B→收尾）\n`;
    if(sp.includes("yt_community"))p+=`📣 YT社群貼文（${form.ytCommunityType||"預熱型"}，100–200字）\n`;
    if(sp.includes("storyboard"))p+=`🎞️ 分鏡腳本（5個鏡頭，畫面描述/台詞/動作/字幕）\n`;
    if(sp.includes("long_script"))p+=`🎙️ 長影片逐字稿（七幕含時間戳，目標完播率>45%）\n`;
    o.push(p);
  }
  o.push(`【三個標題備選】\nA. 痛點點名型：「[房仲常犯錯誤]？難怪你[負面結果]」\nB. 數字具體型：「[數字]+[結果]：[方法]」\nC. 顛覆認知型：「[所有人以為A]，但頂尖房仲在做[B]」\n推薦：說明哪個最強及原因`);
  if(form.thumbnailStyle)o.push(`【縮圖方案—風格${form.thumbnailStyle}：${THUMBNAIL_STYLES.find(t=>t.id===form.thumbnailStyle)?.label}】\n1. Midjourney完整英文提示詞（--ar 9:16 --style raw --v 6）\n2. Canva排版指引\n3. 縮圖文字建議（主標≤10字+副標≤15字）`);
  parts.push(...o);
  return parts.join("\n\n");
}

/* ── API ── */
async function streamClaude(k,sys,usr,cb){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,system:sys,messages:[{role:"user",content:usr}],stream:true})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`API錯誤${r.status}`);}
  const rd=r.body.getReader();const dc=new TextDecoder();let buf="";
  while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ls=buf.split("\n");buf=ls.pop();for(const l of ls){if(!l.startsWith("data: "))continue;const d=l.slice(6).trim();if(d==="[DONE]")continue;try{const j=JSON.parse(d);if(j.type==="content_block_delta"&&j.delta?.type==="text_delta")cb(j.delta.text);}catch{}}}
}
async function streamOpenAI(k,sys,usr,cb){
  const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${k}`},body:JSON.stringify({model:"gpt-4o",max_tokens:8000,messages:[{role:"system",content:sys},{role:"user",content:usr}],stream:true})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`API錯誤${r.status}`);}
  const rd=r.body.getReader();const dc=new TextDecoder();let buf="";
  while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ls=buf.split("\n");buf=ls.pop();for(const l of ls){if(!l.startsWith("data: "))continue;const d=l.slice(6).trim();if(d==="[DONE]")continue;try{const j=JSON.parse(d);const t=j.choices?.[0]?.delta?.content;if(t)cb(t);}catch{}}}
}
async function streamGemini(k,sys,usr,cb){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${k}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{role:"user",parts:[{text:usr}]}],generationConfig:{maxOutputTokens:8000}})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`API錯誤${r.status}`);}
  const rd=r.body.getReader();const dc=new TextDecoder();let buf="";
  while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ls=buf.split("\n");buf=ls.pop();for(const l of ls){if(!l.startsWith("data: "))continue;const d=l.slice(6).trim();if(!d)continue;try{const j=JSON.parse(d);const t=j.candidates?.[0]?.content?.parts?.[0]?.text;if(t)cb(t);}catch{}}}
}
async function fetchHotTopics(prov,k){
  const{system:sys,user:usr}=buildHotTopicPrompt();let full="";const cb=t=>{full+=t;};
  if(prov==="claude")await streamClaude(k,sys,usr,cb);
  else if(prov==="openai")await streamOpenAI(k,sys,usr,cb);
  else await streamGemini(k,sys,usr,cb);
  const m=full.match(/\{[\s\S]*\}/);if(!m)throw new Error("無法解析回應");
  return JSON.parse(m[0]);
}

            <Label>③ 腳本類型</Label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              {SCRIPT_TYPES.map(s=>(
                <button key={s.id} onClick={()=>setForm(f=>({...f,scriptType:s.id}))} style={{padding:"8px 14px",borderRadius:10,border:`1.5px solid ${form.scriptType===s.id?G:"#E0E0E0"}`,background:form.scriptType===s.id?"#FFF8E1":WH,cursor:"pointer",transition:"all .15s"}}>
                  <div style={{fontSize:12,fontWeight:800,color:form.scriptType===s.id?G:"#555"}}>{s.label}</div>
                  <div style={{fontSize:10,color:"#AAA"}}>{s.desc}</div>
                </button>
              ))}
            </div>
            {(form.scriptType==="shorts"||form.scriptType==="both")&&(
              <div style={{background:"#FAFAFA",border:"1px solid #EEE",borderRadius:8,padding:10}}>
                <div style={{fontSize:10,color:"#888",marginBottom:6,fontWeight:700}}>開場 Interrupt 手法</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {INTERRUPT_TYPES.map(t=>(
                    <button key={t.id} onClick={()=>setForm(f=>({...f,interruptType:t.id}))} style={{padding:"4px 10px",borderRadius:20,border:`1.5px solid ${form.interruptType===t.id?G:"#DDD"}`,background:form.interruptType===t.id?"#FFF8E1":WH,color:form.interruptType===t.id?G:"#555",cursor:"pointer",fontSize:11,fontWeight:600}}>{t.label}</button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* ④ Platforms */}
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <Label>④ 選擇輸出平台</Label>
              <div style={{display:"flex",gap:10,marginBottom:8}}>
                <button onClick={()=>setForm(f=>({...f,platforms:PLATFORMS.map(p=>p.id)}))} style={{fontSize:11,color:G,background:"none",border:"none",cursor:"pointer",fontWeight:800}}>全選</button>
                <button onClick={()=>setForm(f=>({...f,platforms:[]}))} style={{fontSize:11,color:"#AAA",background:"none",border:"none",cursor:"pointer"}}>清除</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {PLATFORMS.map(p=>(
                <button key={p.id} onClick={()=>togglePlat(p.id)} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${form.platforms.includes(p.id)?G:"#E0E0E0"}`,background:form.platforms.includes(p.id)?"#FFF8E1":WH,cursor:"pointer",transition:"all .15s",textAlign:"left"}}>
                  <div style={{fontSize:14,marginBottom:2}}>{p.icon}</div>
                  <div style={{fontSize:10,color:form.platforms.includes(p.id)?G:"#888",fontWeight:600,lineHeight:1.3}}>{p.label}</div>
                </button>
              ))}
            </div>
          </div>

          {/* ⑤ Thumbnail */}
          <div style={{marginBottom:24}}>
            <Label>⑤ 縮圖風格（可不選）</Label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {THUMBNAIL_STYLES.map(t=>(
                <button key={t.id} onClick={()=>setForm(f=>({...f,thumbnailStyle:f.thumbnailStyle===t.id?"":t.id}))} style={{padding:"10px 12px",borderRadius:9,border:`1.5px solid ${form.thumbnailStyle===t.id?G:"#E0E0E0"}`,background:form.thumbnailStyle===t.id?"#FFF8E1":WH,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
                  <div style={{fontSize:12,fontWeight:900,color:form.thumbnailStyle===t.id?G:"#AAA",marginBottom:2}}>{t.id}</div>
                  <div style={{fontSize:11,fontWeight:700,color:form.thumbnailStyle===t.id?BK:"#555"}}>{t.label}</div>
                  <div style={{fontSize:10,color:"#AAA"}}>{t.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Generate Button */}
          <button onClick={generate} disabled={gen} style={{
            width:"100%",padding:"15px",borderRadius:12,
            border:gen?"1.5px solid #DDD":`2px solid ${G}`,
            cursor:gen?"not-allowed":"pointer",fontSize:14,fontWeight:900,
            background:gen?"#F5F5F5":`linear-gradient(135deg,${G} 0%,${G2} 50%,${G} 100%)`,
            color:gen?"#AAA":BK,transition:"all .2s",letterSpacing:.2,
            boxShadow:gen?"none":`0 4px 20px ${G}40`
          }}>
            {gen?`⏳ ${ap?.icon} 正在生成中...`:`🚀 用 ${ap?.name} 一鍵生成所有提示詞`}
          </button>
          {gen&&<div style={{marginTop:10,fontSize:11,color:"#AAA",textAlign:"center",lineHeight:1.7,animation:"pulse 1.5s ease infinite"}}>
            {ap?.name} 生成中，依選擇平台數量約需 30–90 秒，請稍候...
          </div>}

          {/* Footer */}
          <div style={{marginTop:24,paddingTop:16,borderTop:"1px solid #F0F0F0",display:"flex",alignItems:"center",gap:8}}>
            <Logo size={24}/>
            <div style={{fontSize:10,color:"#CCC"}}>房叔自媒體學院 © 2026 · G UNCLE house</div>
          </div>
        </div>

        {/* ── RIGHT PANEL (Result) ── */}
        {(step===2||step===3)&&(
          <div ref={resultRef} style={{flex:1,padding:"24px 28px",overflowY:"auto",background:"#FAFAFA"}} className="fade-in">

            {step===2&&!result&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
                <div style={{width:56,height:56,border:`3px solid ${G}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
                <div style={{fontSize:14,color:"#888",textAlign:"center",lineHeight:1.8}}>
                  {ap?.icon} {ap?.name} 正在生成<br/>
                  <span style={{color:G,fontWeight:800}}>{PILLARS.find(p=>p.code===form.pillar)?.name}</span> 的完整內容...
                </div>
              </div>
            )}

            {result&&(
              <div>
                {/* Result Header */}
                <div style={{background:BK,borderRadius:10,padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",border:`1.5px solid ${G}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,fontWeight:800,color:G2}}>✅ 生成完成 — 柱{form.pillar} · {PILLARS.find(p=>p.code===form.pillar)?.name}</span>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:G+"30",color:G2,fontWeight:700,border:`1px solid ${G}50`}}>{ap?.icon} {ap?.name}</span>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <CopyBtn text={result}/>
                    <button onClick={()=>{const b=new Blob([result],{type:"text/plain;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`提示詞_${form.topic.slice(0,10)}.txt`;a.click();}} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #333",background:"#1A1A1A",color:"#AAA",fontSize:11,cursor:"pointer",fontWeight:700}}>下載 .txt</button>
                  </div>
                </div>

                {sections.length>1?sections.map((sec,i)=>{
                  const isScript=sec.includes("IGNITE")||sec.includes("七幕");
                  const isFB=sec.includes("Facebook")||sec.includes("FB");
                  const isTitle=sec.includes("標題備選");
                  const isThumbnail=sec.includes("縮圖方案");
                  const isPlatform=sec.includes("跨平台");
                  const bc=isScript?"#7C3AED":isFB?"#D97706":isTitle?"#2563EB":isThumbnail?"#16A34A":G;
                  return(
                    <div key={i} style={{marginBottom:14,background:WH,borderRadius:12,border:`1px solid ${bc}30`,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                      <div style={{padding:"9px 16px",background:bc+"10",borderBottom:`2px solid ${bc}20`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:3,height:14,background:bc,borderRadius:2}}/>
                          <span style={{fontSize:12,fontWeight:800,color:bc}}>{isScript?"🎬 腳本":isFB?"👥 FB長文":isTitle?"📌 標題":isThumbnail?"🎨 縮圖":isPlatform?"📣 跨平台":`區塊 ${i+1}`}</span>
                        </div>
                        <CopyBtn text={sec}/>
                      </div>
                      <pre style={{padding:"14px 16px",margin:0,fontSize:13,lineHeight:2,color:"#1A1A1A",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"'Noto Sans TC','PingFang TC',monospace"}}>{sec.trim()}</pre>
                    </div>
                  );
                }):(
                  <div style={{background:WH,borderRadius:12,border:"1px solid #E0E0E0",padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                    <pre style={{margin:0,fontSize:13,lineHeight:2,color:"#1A1A1A",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"'Noto Sans TC',monospace"}}>{result}</pre>
                  </div>
                )}

                {/* Warning */}
                <div style={{marginTop:20,background:"#FFF8E1",borderRadius:10,padding:"14px 18px",border:`1px solid ${G}50`}}>
                  <div style={{fontSize:11,fontWeight:800,color:G,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{display:"inline-block",width:3,height:13,background:G,borderRadius:2}}/>⚠️ 使用前必確認
                  </div>
                  {["所有具體數字（房市統計、政策條件）請自行查詢最新來源核實","腳本中的案例故事如涉及真實客戶，發布前需取得同意或匿名處理","FB長文的留言關鍵字請設計成與主題直接相關的 2–4 字短詞","縮圖 Midjourney 提示詞建議先跑 2–4 張，選最有衝擊力的版本"].map((t,i)=>(
                    <div key={i} style={{fontSize:11,color:"#555",marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${G}60`,lineHeight:1.7}}>{t}</div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
